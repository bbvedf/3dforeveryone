version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: 3dforeveryone-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tienda-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Aplicación FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3dforeveryone-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='*'
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./logs/api:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tienda-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 3dforeveryone-ui
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - tienda-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Proxy Inverso Nginx
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: 3dforeveryone-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
      - goaccess
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./logs/nginx:/var/log/nginx
      - ./monitor_html:/var/www/monitor
    networks:
      - tienda-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot - SSL Certificates
  certbot:
    image: certbot/certbot
    container_name: 3dforeveryone-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - tienda-network

  # GoAccess - Real-time log analyzer
  goaccess:
    image: allinurl/goaccess
    container_name: 3dforeveryone-goaccess
    user: root
    volumes:
      - ./logs/nginx:/opt/goaccess/logs
      - ./monitor_html:/opt/goaccess/www
    # Comando para producir el HTML y servir el WebSocket
    command: >
      /opt/goaccess/logs/access.log -o /opt/goaccess/www/index.html --log-format=COMBINED --real-time-html --no-global-config --addr=0.0.0.0 --port=7890 --ws-url=wss://ryzenpc.mooo.com:443/monitor-ws --origin=https://ryzenpc.mooo.com
    networks:
      - tienda-network

  # MailHog - SMTP testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: 3dforeveryone-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tienda-network

networks:
  tienda-network:
    driver: bridge

volumes:
  postgres_data:
