server {
    listen 80;
    server_name localhost ryzenpc.mooo.com;

    # Ruta para el desafío de Certbot (Validación SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ryzenpc.mooo.com;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/ryzenpc.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ryzenpc.mooo.com/privkey.pem;

    # Configuraciones de seguridad SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self';";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy para el Frontend (Vite)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy para la API (Backend)
    location /api {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rutas directas para pagos y documentación
    location ~ ^/(paypal|stripe|docs|openapi.json|redoc) {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para los archivos estáticos de uploads
    location /uploads/ {
        proxy_pass http://api:8000/uploads/;
        proxy_set_header Host $host;
    }

    client_max_body_size 10M;
}
